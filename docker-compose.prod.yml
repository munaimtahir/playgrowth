services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - backend_staticfiles:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "127.0.0.1:8057:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    command: celery -A config worker -l info
    volumes:
      - backend_staticfiles:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      - backend
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://play.vexel.pk/api/v1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3057:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_staticfiles:
  backend_media:
